<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Assistant - Gemini Powered</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Gemini Code Assistant</h1>
        <nav>
            <span id="userInfo" style="font-weight: 600;"></span>
            <a href="#" onclick="logout()">Sign Out</a>
        </nav>
    </header>
    <main>
        <div class="card">
            <h2>Solve a Problem</h2>
            <form id="queryForm">
                <div class="form-group">
                    <label for="query">Problem Description</label>
                    <textarea id="query" name="query" placeholder="Paste your LeetCode problem or describe a task..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="user_code">Your Code (Optional)</label>
                    <textarea id="user_code" name="user_code" placeholder="Paste your current code here for debugging or optimization..."></textarea>
                </div>
                <div class="form-group">
                    <label for="mode">Expertise Mode</label>
                    <select id="mode" name="mode">
                        <option value="solve">Full Solution</option>
                        <option value="debug">Debug My Code</option>
                        <option value="optimize">Optimize Complexity</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">Generate Solution</button>
            </form>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div id="statusText">Gemini is thinking...</div>
            </div>
            
            <div id="error" class="error"></div>
            <div id="result" class="result-area"></div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        function logout() {
            localStorage.removeItem('token');
            document.cookie = "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '/login';
        }

        document.getElementById('queryForm').onsubmit = async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const submitBtn = document.getElementById('submitBtn');
            const statusText = document.getElementById('statusText');
            
            const query = document.getElementById('query').value;
            const user_code = document.getElementById('user_code').value;
            const mode = document.getElementById('mode').value;

            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            submitBtn.disabled = true;
            
            let fullMarkdown = "";

            try {
                const response = await fetch('/api/v1/query/text', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ query, user_code, mode })
                });

                if (response.ok) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    
                    resultDiv.style.display = 'block';
                    loadingDiv.style.display = 'none';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const data = JSON.parse(line);
                                if (data.type === 'status') {
                                    // Could update statusText here if visible
                                } else if (data.type === 'final' || data.type === 'agent_step') {
                                    fullMarkdown += data.content;
                                    // Use marked to render Markdown to HTML
                                    resultDiv.innerHTML = marked.parse(fullMarkdown);
                                    // Scroll to bottom
                                    window.scrollTo(0, document.body.scrollHeight);
                                } else if (data.type === 'error') {
                                    errorDiv.innerText = data.content;
                                    errorDiv.style.display = 'block';
                                }
                            } catch (e) {}
                        }
                    }
                } else {
                    const err = await response.json();
                    if (response.status === 401) logout();
                    throw new Error(err.detail || 'Request failed');
                }
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
